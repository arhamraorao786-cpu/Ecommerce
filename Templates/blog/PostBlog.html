<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog</title>
          <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
<div class="container mt-4">
  <div class="row">

    <!-- Blog Content -->
    <div class="col-md-8">
      <div class="card shadow-sm mb-4">
        <img src="{{ Post.image.url }}" class="card-img-top" height="350px" alt="Blog Image">

        <div class="card-body">
          <h2 class="card-title">{{ Post.title }}</h2>
          <p class="text-muted">{{ Post.p_date }}</p>

          <p>{{ Post.intro }}</p>

          <h4>{{ Post.head1 }}</h4>
          <p>{{ Post.Chead1 }}</p>

          <h4>{{ Post.head2 }}</h4>
          <p>{{ Post.Chead2 }}</p>

          <h4>{{ Post.head3 }}</h4>
          <p>{{ Post.Chead3 }}</p>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="col-md-4">
      <div class="card mb-3 shadow-sm">
        <div class="card-body">
          <h5>About</h5>
          <p>This is a professional blog website built with Django.</p>
        </div>
      </div>


      <div class="card shadow-sm">
        <div class="card-body">
          <h5>Social Links</h5>
          <ul class="list-unstyled">
            <li><a href="#">GitHub</a></li>
            <li><a href="#">Twitter</a></li>
            <li><a href="#">Facebook</a></li>
          </ul>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
